# 아래 훅들은 이 레포의 코어 전역 훅이다. 예전에는 gitignored
# claude.local.yaml에만 있어 버전 관리 밖이었고 -- 추적되는 파일만 읽으면
# 등록 여부를 알 수 없어, 새 머신에 클론하면 전역 훅이 통째로 없었다. 이
# 4종(keyword-detector.sh / pre-tool-enforcer.sh / session-start.sh /
# persistent-mode)에는 device-specific 요소가 없으므로 여기서 추적한다.
# claude.local.yaml에는 실제로 머신마다 다른 것만 남긴다 -- Superset 훅
# preserve 규칙, maestro JAVA_HOME 절대경로, env 의존 MCP.
#
# projects/*/claude.yaml에 같은 4종을 다시 쓰지 말 것: 전역 등록은
# ~/.claude/settings.json에, 프로젝트 등록은 대상의
# .claude/settings.local.json에 착지하고 Claude Code가 둘을 병합하므로
# 이중 발동한다(session-start.sh는 stdout을 프리픽스에 두 번 주입한다).
hooks:
  UserPromptSubmit:
    - component: keyword-detector.sh
      timeout: 10
  PreToolUse:
    - component: pre-tool-enforcer.sh
      timeout: 5
    - component: label-commit-gate.sh
      matcher: "Bash"
      timeout: 5
  PostToolUse:
    - component: label-edit-warn.sh
      matcher: "Write|Edit|MultiEdit"
      timeout: 5
  SessionStart:
    - component: session-start.sh
      timeout: 10
    - component: pin-session-start
      timeout: 10
  Stop:
    - component: persistent-mode
      timeout: 15

config:
  language: "한국어"
  outputStyle: "Explanatory"
  includeCoAuthoredBy: false
  env:
    CLAUDE_CODE_AUTO_COMPACT_WINDOW: "400000"
    CLAUDE_AFK_TIMEOUT_MS: "2147483647"
    # 루트(main, depth 0) 아래 허용되는 서브에이전트 세대 수. 2.1.218 기본값
    # 1은 "서브에이전트가 서브에이전트를 못 부름"이라, code-reviewer 안에서
    # chunk-reviewer를 팬아웃하는 식의 2세대 디스패치가 통째로 막힌다.
    # 2 = main -> sub -> sub 까지 허용, 3세대부터 차단.
    # codex.yaml의 agents.max_depth와 같은 축이고 계산 기준도 같다(둘 다 루트=0).
    CLAUDE_CODE_MAX_SUBAGENT_SPAWN_DEPTH: "2"
  attribution:
    commit: ""
    pr: ""
  skipDangerousModePermissionPrompt: true
  disableAutoMode: "disable"
  permissions:
    defaultMode: "bypassPermissions"
    deny:
      - "Bash(git push --force*)"
      - "Bash(git push * --force*)"
      - "Bash(git push -f*)"
      - "Bash(git push * -f*)"
      - "Bash(rm -rf *)"
      - "Bash(rm -fr *)"
      - "Bash(rm -Rf *)"
      - "Bash(rm -r -f *)"
      - "Bash(rm -f -r *)"

mcps:
  playwright:
    command: npx
    args:
      - "--prefer-offline"
      - "-y"
      - "@playwright/mcp@0.0.76"
  # codegraph local code-graph MCP (Tree-sitter -> SQLite call graph; 100% local, no API key).
  # Requires per-machine binary (`npm i -g @colbymchenry/codegraph`) and per-repo `codegraph init` to build the index.
  codegraph:
    command: codegraph
    args:
      - "serve"
      - "--mcp"
  # Maestro stdio MCP. Requires the maestro CLI on PATH (and JAVA_HOME in shell env for the JVM-based runner).
  # On platforms that launch MCP servers in a minimal shell (no profile PATH), replace 'maestro' with its absolute path.
  maestro:
    command: maestro
    args:
      - "mcp"

plugins:
  items:
    - context7
    - code-review
    - frontend-design
    - name: plannotator@plannotator
      check: jq -e '.plugins["plannotator@plannotator"]' ~/.claude/plugins/installed_plugins.json >/dev/null 2>&1
      pre-commands:
        - curl -fsSL https://plannotator.ai/install.sh | bash
        - claude plugin marketplace add backnotprop/plannotator
    - name: skill-creator@claude-plugins-official
      check: jq -e '.plugins["skill-creator@claude-plugins-official"]' ~/.claude/plugins/installed_plugins.json >/dev/null 2>&1
      pre-commands:
        - claude plugin marketplace add anthropics/claude-plugins-official
