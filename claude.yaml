hooks:
  SessionStart:
    - component: codegraph-init.sh
  PreCompact:
    - component: pre-compact.sh
      timeout: 1200

config:
  language: "한국어"
  outputStyle: "Explanatory"
  includeCoAuthoredBy: false
  env:
    CLAUDE_CODE_AUTO_COMPACT_WINDOW: "400000"
  attribution:
    commit: ""
    pr: ""
  skipDangerousModePermissionPrompt: true
  disableAutoMode: "disable"
  permissions:
    defaultMode: "bypassPermissions"
    deny:
      - "Bash(git push --force*)"
      - "Bash(git push * --force*)"
      - "Bash(git push -f*)"
      - "Bash(git push * -f*)"
      - "Bash(rm -rf *)"
      - "Bash(rm -fr *)"
      - "Bash(rm -Rf *)"
      - "Bash(rm -r -f *)"
      - "Bash(rm -f -r *)"

mcps:
  # Requires shell env: OPENSEARCH_URL, OPENSEARCH_USERNAME, OPENSEARCH_PASSWORD
  # (AWS: AWS_REGION, AWS_IAM_ARN or AWS_PROFILE). See opensearch-project/opensearch-mcp-server-py.
  opensearch:
    command: uvx
    args:
      - "opensearch-mcp-server-py"
  playwright:
    command: npx
    args:
      - "--prefer-offline"
      - "-y"
      - "@playwright/mcp@0.0.76"
  # Linear hosted MCP. Claude Code supports remote HTTP natively (Linear allows DCR), so no mcp-remote proxy needed.
  linear:
    type: http
    url: "https://mcp.linear.app/mcp"
  # Slack hosted MCP. Rejects dynamic client registration, so OAuth needs Slack's pre-registered public client
  # (no secret, PKCE). clientId/callbackPort are Slack's published values for the Claude Code integration.
  slack:
    type: http
    url: "https://mcp.slack.com/mcp"
    oauth:
      clientId: "1601185624273.8899143856786"
      callbackPort: 3118
  # codegraph local code-graph MCP (Tree-sitter -> SQLite call graph; 100% local, no API key).
  # Requires per-machine binary (`npm i -g @colbymchenry/codegraph`) and per-repo `codegraph init` to build the index.
  codegraph:
    command: codegraph
    args:
      - "serve"
      - "--mcp"

plugins:
  items:
    - context7
    - superpowers
    - code-review
    - frontend-design
    - name: plannotator@plannotator
      check: jq -e '.plugins["plannotator@plannotator"]' ~/.claude/plugins/installed_plugins.json >/dev/null 2>&1
      pre-commands:
        - curl -fsSL https://plannotator.ai/install.sh | bash
        - claude plugin marketplace add backnotprop/plannotator
    - name: skill-creator@claude-plugins-official
      check: jq -e '.plugins["skill-creator@claude-plugins-official"]' ~/.claude/plugins/installed_plugins.json >/dev/null 2>&1
      pre-commands:
        - claude plugin marketplace add anthropics/claude-plugins-official
