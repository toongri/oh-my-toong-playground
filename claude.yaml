config:
  language: "한국어"
  outputStyle: "Explanatory"
  includeCoAuthoredBy: false
  env:
    CLAUDE_AUTOCOMPACT_PCT_OVERRIDE: "40"
  attribution:
    commit: ""
    pr: ""
  skipDangerousModePermissionPrompt: true
  permissions:
    deny:
      - "Bash(git push --force*)"
      - "Bash(git push * --force*)"
      - "Bash(git push -f*)"
      - "Bash(git push * -f*)"
      - "Bash(rm -rf *)"
      - "Bash(rm -fr *)"
      - "Bash(rm -Rf *)"
      - "Bash(rm -r -f *)"
      - "Bash(rm -f -r *)"

mcps:
  # Requires shell env: OPENSEARCH_URL, OPENSEARCH_USERNAME, OPENSEARCH_PASSWORD
  # (AWS: AWS_REGION, AWS_IAM_ARN or AWS_PROFILE). See opensearch-project/opensearch-mcp-server-py.
  opensearch:
    command: uvx
    args:
      - "opensearch-mcp-server-py"

plugins:
  items:
    - context7
    - serena
    - superpowers
    - code-review
    - name: plannotator@plannotator
      check: jq -e '.plugins["plannotator@plannotator"]' ~/.claude/plugins/installed_plugins.json >/dev/null 2>&1
      pre-commands:
        - curl -fsSL https://plannotator.ai/install.sh | bash
        - claude plugin marketplace add backnotprop/plannotator
    - name: skill-creator@claude-plugins-official
      check: jq -e '.plugins["skill-creator@claude-plugins-official"]' ~/.claude/plugins/installed_plugins.json >/dev/null 2>&1
      pre-commands:
        - claude plugin marketplace add anthropics/claude-plugins-official
