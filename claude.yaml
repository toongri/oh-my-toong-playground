hooks:
  PreToolUse:
    - component: label-commit-gate.sh
      matcher: "Bash"
      timeout: 5
  PostToolUse:
    - component: label-edit-warn.sh
      matcher: "Write|Edit|MultiEdit"
      timeout: 5

config:
  language: "한국어"
  outputStyle: "Explanatory"
  includeCoAuthoredBy: false
  env:
    CLAUDE_CODE_AUTO_COMPACT_WINDOW: "400000"
    CLAUDE_AFK_TIMEOUT_MS: "2147483647"
  attribution:
    commit: ""
    pr: ""
  skipDangerousModePermissionPrompt: true
  disableAutoMode: "disable"
  permissions:
    defaultMode: "bypassPermissions"
    deny:
      - "Bash(git push --force*)"
      - "Bash(git push * --force*)"
      - "Bash(git push -f*)"
      - "Bash(git push * -f*)"
      - "Bash(rm -rf *)"
      - "Bash(rm -fr *)"
      - "Bash(rm -Rf *)"
      - "Bash(rm -r -f *)"
      - "Bash(rm -f -r *)"

mcps:
  playwright:
    command: npx
    args:
      - "--prefer-offline"
      - "-y"
      - "@playwright/mcp@0.0.76"
  # codegraph local code-graph MCP (Tree-sitter -> SQLite call graph; 100% local, no API key).
  # Requires per-machine binary (`npm i -g @colbymchenry/codegraph`) and per-repo `codegraph init` to build the index.
  codegraph:
    command: codegraph
    args:
      - "serve"
      - "--mcp"
  # Maestro stdio MCP. Requires the maestro CLI on PATH (and JAVA_HOME in shell env for the JVM-based runner).
  # On platforms that launch MCP servers in a minimal shell (no profile PATH), replace 'maestro' with its absolute path.
  maestro:
    command: maestro
    args:
      - "mcp"

plugins:
  items:
    - context7
    - code-review
    - frontend-design
    - name: plannotator@plannotator
      check: jq -e '.plugins["plannotator@plannotator"]' ~/.claude/plugins/installed_plugins.json >/dev/null 2>&1
      pre-commands:
        - curl -fsSL https://plannotator.ai/install.sh | bash
        - claude plugin marketplace add backnotprop/plannotator
    - name: skill-creator@claude-plugins-official
      check: jq -e '.plugins["skill-creator@claude-plugins-official"]' ~/.claude/plugins/installed_plugins.json >/dev/null 2>&1
      pre-commands:
        - claude plugin marketplace add anthropics/claude-plugins-official
