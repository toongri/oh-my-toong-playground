# MCP definitions for Codex.
# Note: Figma uses Codex remote MCP config; gemini still uses mcp-remote.
model-map:
  tiers:
    opus:
      model: gpt-5.6-sol
      effort: high
    sonnet:
      model: gpt-5.6-terra
      effort: medium
  agents:
    code-reviewer:
      model: gpt-5.6-sol
      effort: high
    metis:
      model: gpt-5.6-sol
      effort: high
    momus:
      model: gpt-5.6-sol
      effort: high
    tech-claim-examiner:
      model: gpt-5.6-sol
      effort: high
hooks:
  SessionStart:
    - component: rules-injector
      type: command
      command: "bun run .codex/hooks/rules-injector/cli.ts hook session-start"
    - component: codex-ledger.sh
      type: command
    # Claude<->Codex hook-parity: root claude.yaml registers pin-session-start
    # globally (SessionStart), so its Codex analog is global too. pin-session-
    # start needs no Codex-specific shim: its own logic already reads only
    # `.cwd` (never a Claude-only session-id shape -- see hooks/pin-session-
    # start/index.ts) and never emits Claude's `continue` key, so the SAME
    # component deploys unmodified to both platforms.
    - component: pin-session-start
      type: command
      timeout: 10
  UserPromptSubmit:
    - component: rules-injector
      type: command
      command: "bun run .codex/hooks/rules-injector/cli.ts hook user-prompt-submit"
    # Claude<->Codex hook-parity: root claude.yaml registers keyword-detector.sh
    # globally (UserPromptSubmit), so its Codex analog is global too -- see
    # hooks/codex-keyword-detector.sh + shared hooks/keyword-detector-core.sh.
    - component: codex-keyword-detector.sh
      type: command
      timeout: 10
  PreToolUse:
    - component: codex-write-guard.sh
      type: command
      matcher: "Bash|bash|apply_patch|exec_command|shell_command|Edit|Write|edit|write|multiedit|multi_edit"
  PostToolUse:
    - component: rules-injector
      type: command
      matcher: "Bash|bash|apply_patch|exec_command|shell_command|Edit|Write"
      command: "bun run .codex/hooks/rules-injector/cli.ts hook post-tool-use"
    - component: codex-persistent-mode
      type: command
      # update_plan feeds the baseline todo-continuation writer; bash/shell_command/
      # exec_command additionally feed the skill-chain ratchet writer (SKILL.md opens
      # are read via a shell command, not a dedicated file-read tool — see cli.ts's header).
      matcher: "^update_plan$|Bash|bash|exec_command|shell_command"
      command: "bun run .codex/hooks/codex-persistent-mode/cli.ts hook post-tool-use"
  PostCompact:
    - component: rules-injector
      type: command
      command: "bun run .codex/hooks/rules-injector/cli.ts hook post-compact"
  Stop:
    - component: codex-persistent-mode
      type: command
      command: "bun run .codex/hooks/codex-persistent-mode/cli.ts hook stop"
config:
  agents:
    # claude.yaml의 CLAUDE_CODE_MAX_SUBAGENT_SPAWN_DEPTH와 같은 축이자 같은
    # 계산 기준 -- 루트 세션이 depth 0, 자식이 부모+1이고 child_depth >
    # max_depth면 "Agent depth limit reached"로 차단된다. 2 = 루트 -> 서브 ->
    # 서브까지 허용.
    #
    # 경고: codex 0.145.0에서 이 키는 실질적으로 무동작이다. 상류 정의가
    # "Maximum nesting depth for V1 agent threads. Ignored by V2."이고
    # multi_agents_v2/spawn.rs에는 depth 비교 게이트 자체가 없는데, 이 버전의
    # 스폰은 V2 경로로 돈다 -- `codex features list`가 multi_agent_v2=false로
    # 보고해도 그렇다. 격리 HOME 프로브에서 max_depth=1인 채로 depth 2 스폰이
    # 통과했고 rollout의 thread_spawn 기록으로 확인했다. Codex 쪽에는 현재
    # 중첩 깊이를 제한할 수 있는 대체 키가 없다. V1 경로를 타거나 V2에 캡이
    # 생기면 그때부터 유효해진다.
    max_depth: 2

mcps:
  context7:
    command: npx
    args:
      - "--prefer-offline"
      - "-y"
      - "@upstash/context7-mcp@3.2.1"
  # Figma hosted MCP. Codex handles this as a streamable HTTP server with OAuth login.
  figma:
    url: "https://mcp.figma.com/mcp"
  playwright:
    command: npx
    args:
      - "--prefer-offline"
      - "-y"
      - "@playwright/mcp@0.0.76"
  # codegraph local code-graph MCP (Tree-sitter -> SQLite call graph; 100% local, no API key).
  # Requires per-machine binary (`npm i -g @colbymchenry/codegraph`) and per-repo `codegraph init` to build the index.
  codegraph:
    command: codegraph
    args:
      - "serve"
      - "--mcp"
  # Maestro stdio MCP. Requires the maestro CLI on PATH (and JAVA_HOME in shell env for the JVM-based runner).
  # On platforms that launch MCP servers in a minimal shell (no profile PATH), replace 'maestro' with its absolute path.
  maestro:
    command: maestro
    args:
      - "mcp"
