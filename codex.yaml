# MCP definitions for Codex.
# Note: Figma uses Codex remote MCP config; gemini still uses mcp-remote.
hooks:
  SessionStart:
    - component: rules-injector
      type: command
      command: "bun run .codex/hooks/rules-injector/cli.ts hook session-start"
  UserPromptSubmit:
    - component: rules-injector
      type: command
      command: "bun run .codex/hooks/rules-injector/cli.ts hook user-prompt-submit"
  PostToolUse:
    - component: rules-injector
      type: command
      matcher: "Bash|bash|apply_patch|exec_command|shell_command|Edit|Write"
      command: "bun run .codex/hooks/rules-injector/cli.ts hook post-tool-use"
  PostCompact:
    - component: rules-injector
      type: command
      command: "bun run .codex/hooks/rules-injector/cli.ts hook post-compact"
mcps:
  context7:
    command: npx
    args:
      - "--prefer-offline"
      - "-y"
      - "@upstash/context7-mcp@3.2.1"
  # Figma hosted MCP. Codex handles this as a streamable HTTP server with OAuth login.
  figma:
    url: "https://mcp.figma.com/mcp"
  playwright:
    command: npx
    args:
      - "--prefer-offline"
      - "-y"
      - "@playwright/mcp@0.0.76"
  # codegraph local code-graph MCP (Tree-sitter -> SQLite call graph; 100% local, no API key).
  # Requires per-machine binary (`npm i -g @colbymchenry/codegraph`) and per-repo `codegraph init` to build the index.
  codegraph:
    command: codegraph
    args:
      - "serve"
      - "--mcp"
  # Maestro stdio MCP. Requires the maestro CLI on PATH (and JAVA_HOME in shell env for the JVM-based runner).
  # On platforms that launch MCP servers in a minimal shell (no profile PATH), replace 'maestro' with its absolute path.
  maestro:
    command: maestro
    args:
      - "mcp"
