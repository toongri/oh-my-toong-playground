name: oh-my-toong
path: ~/repos/oh-my-toong-playground/main

provision:
  - check: "command -v codegraph"
    commands:
      - "npm i -g @colbymchenry/codegraph"
  - check: "test -f .codegraph/codegraph.db"
    commands:
      - "codegraph init"

agents:
  items:
    - explore
    - librarian
    - metis
    - mnemosyne
    - momus
    - oracle
    - daedalus
    - chunk-reviewer
    - code-reviewer
    - sisyphus-junior
    - hermes

skills:
  items:
    - component: deep-interview
    - component: prometheus
      platforms: [claude]
    - component: sisyphus
      platforms: [claude]
    - component: goal
      platforms: [claude]
    - component: ultraresearch
      platforms: [claude]
    - component: insane-browsing
      platforms: [claude]
    - agent-council
    - clarify
    - git-master
    - momus
    - diagnose
    - design-review
    - qa
    - component: code-review
      platforms: [claude]
    - make-pr
    - component: craft-issue
      platforms: [claude]
    - technical-writing
    - technical-copywriting
    - humanizer
    - orchestrate-review
    - review-report
    - create-slides
    - slides-review
    - collect-jd
    - hud

rules:
  items:
    - tool-usage-policy
    - work-principles
    - coding-discipline
    - least-code
    - private-component-management
    - documentation-currency
    - agent-browser-usage
    - codebase-grounding
