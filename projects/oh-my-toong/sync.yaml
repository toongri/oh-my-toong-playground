name: oh-my-toong
path: /Users/toong/repos/oh-my-toong-playground

agents:
  items:
    - explore
    - librarian
    - metis
    - mnemosyne
    - momus
    - oracle
    - argus
    - chunk-reviewer
    - spec-reviewer
    - sisyphus-junior

commands:
  items:
    - cancel-ralph
    - hud
    - ralph

hooks:
  items:
    - component: keyword-detector.sh
      event: UserPromptSubmit
      timeout: 10
    - component: pre-tool-enforcer.sh
      event: PreToolUse
      timeout: 5
    - component: session-start.sh
      event: SessionStart
      timeout: 10
    - component: persistent-mode
      event: Stop
      timeout: 15
    - component: oh-my-toong:sync-schema-validator.sh
      event: PostToolUse
      matcher: "Edit(**/sync.yaml)"
      timeout: 30
    - component: oh-my-toong:sync-component-validator.sh
      event: Stop
      timeout: 30

skills:
  items:
    - component: spec
      platforms: [claude]
    - component: prometheus
      platforms: [claude]
    - component: sisyphus
      platforms: [claude]
    - agent-council
    - clarify
    - git-committer
    - momus
    - oracle
    - qa
    - component: code-review
      platforms: [claude]
    - make-pr
    - spec-review
    - technical-writing
    - technical-copywriting

scripts:
  items:
    - hud
    - chunk-review
    - council
    - spec-reviewer

rules:
  items:
    - tool-usage-policy
    - work-principles
    - coding-discipline

config:
  claude:
    enableAllProjectMcpServers: true
