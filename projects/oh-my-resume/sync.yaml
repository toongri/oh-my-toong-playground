name: oh-my-resume
path: ~/repos/oh-my-resume/main
platforms: [claude]

agents:
  items:
    - explore
    - librarian
    - mnemosyne
    - oracle
    - daedalus
    - tech-claim-examiner
    - sisyphus-junior
    - spec-reviewer

skills:
  items:
    - deep-interview
    - sisyphus
    - git-master
    - humanizer
    - diagnose
    - design-review
    - qa
    - resume-apply
    - review-resume
    - tech-claim-rubric
    - resume-forge
    - collect-jd
    - mock-interview
    - scan-pdf-to-notes

rules:
  items:
    - tool-usage-policy
    - work-principles
    - coding-discipline
    - least-code
    - resume-workflow

provision:
  # 바이너리 설치는 루트 sync.yaml에서 전역 처리. 여기선 repo별 인덱스만.
  - check: "test -f .codegraph/codegraph.db"
    commands:
      - "codegraph init"
