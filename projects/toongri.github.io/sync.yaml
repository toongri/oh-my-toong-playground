name: toongri.github.io
path: /Users/toong/repos/toongri.github.io/main

agents:
  items:
    - explore
    - librarian
    - metis
    - mnemosyne
    - momus
    - oracle
    - argus
    - chunk-reviewer
    - spec-reviewer
    - sisyphus-junior

commands:
  items:
    - cancel-ralph
    - hud
    - ralph

hooks:
  items:
    - component: keyword-detector.sh
      event: UserPromptSubmit
      timeout: 10
    - component: pre-tool-enforcer.sh
      event: PreToolUse
      timeout: 5
    - component: session-start.sh
      event: SessionStart
      timeout: 10
    - component: persistent-mode
      event: Stop
      timeout: 15

skills:
  items:
    - component: spec
      platforms: [claude]
    - component: prometheus
      platforms: [claude]
    - component: sisyphus
      platforms: [claude]
    - agent-council
    - clarify
    - git-committer
    - momus
    - oracle
    - qa
    - component: code-review
      platforms: [claude]
    - make-pr
    - technical-writing
    - humanizer
    - make-resume
    - review-resume

scripts:
  items:
    - hud
    - chunk-review
    - spec-reviewer

rules:
  items:
    - tool-usage-policy
    - work-principles
    - coding-discipline

config:
  claude:
    enableAllProjectMcpServers: true
