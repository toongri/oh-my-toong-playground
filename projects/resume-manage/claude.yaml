# 코어 훅 4종은 루트 claude.yaml이 전역 등록한다 -- 여기 다시 쓰면 이중
# 발동한다. 이 프로젝트 전용 훅은 없다.

config:
  enableAllProjectMcpServers: true

plugins:
  items:
    - name: frontend-design@claude-plugins-official
      check: jq -e '.plugins["frontend-design@claude-plugins-official"]' ~/.claude/plugins/installed_plugins.json >/dev/null 2>&1
      pre-commands:
        - claude plugin marketplace add anthropics/claude-plugins-official
    - name: insane-search@gptaku-plugins
      check: jq -e '.plugins["insane-search@gptaku-plugins"]' ~/.claude/plugins/installed_plugins.json >/dev/null 2>&1
      pre-commands:
        - claude plugin marketplace add fivetaku/gptaku_plugins
    - name: playwright@claude-plugins-official
      check: jq -e '.plugins["playwright@claude-plugins-official"]' ~/.claude/plugins/installed_plugins.json >/dev/null 2>&1
      pre-commands:
        - claude plugin marketplace add anthropics/claude-plugins-official
