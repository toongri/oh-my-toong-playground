name: resume-manage
path: ~/repos/resume-manage/main

agents:
  items:
    - explore
    - librarian
    - metis
    - mnemosyne
    - momus
    - oracle
    - daedalus
    - chunk-reviewer
    - code-reviewer
    - tech-claim-examiner
    - sisyphus-junior

skills:
  items:
    - component: deep-interview
    - component: prometheus
      platforms: [claude]
    - component: sisyphus
      platforms: [claude]
    - agent-council
    - clarify
    - git-master
    - momus
    - diagnose
    - design-review
    - qa
    - component: code-review
      platforms: [claude]
    - make-pr
    - technical-writing
    - humanizer
    - resume-apply
    - review-resume
    - tech-claim-rubric
    - resume-forge
    - collect-jd
    - orchestrate-review
    - review-report
    - hud
    - mock-interview
    - scan-pdf-to-notes

rules:
  items:
    - tool-usage-policy
    - work-principles
    - coding-discipline
    - least-code
    - resume-workflow

provision:
  # 바이너리 설치는 루트 sync.yaml에서 전역 처리. 여기선 repo별 인덱스만.
  - check: "test -f .codegraph/codegraph.db"
    commands:
      - "codegraph init"
