name: loopers-spring-kotlin-template
path: ~/repos/loopers-spring-kotlin-template/main

agents:
  items:
    - explore
    - librarian
    - metis
    - mnemosyne
    - momus
    - oracle
    - daedalus
    - argus
    - chunk-reviewer
    - code-reviewer
    - sisyphus-junior

skills:
  items:
    - component: deep-interview
    - component: prometheus
      platforms: [claude]
    - component: sisyphus
      platforms: [claude]
    - agent-council
    - clarify
    - git-master
    - momus
    - diagnose
    - design-review
    - testing
    - qa
    - component: code-review
      platforms: [claude]
    - make-pr
    - technical-writing
    - implementation
    - humanizer
    - orchestrate-review
    - review-report
    - hud

rules:
  items:
    - tool-usage-policy
    - work-principles
    - coding-discipline
    - least-code

provision:
  - check: "command -v codegraph"
    commands:
      - "npm i -g @colbymchenry/codegraph"
  - check: "test -f .codegraph/codegraph.db"
    commands:
      - "codegraph init"
