# 코어 훅 4종은 루트 claude.yaml이 전역 등록한다 -- 여기 다시 쓰면 이중
# 발동한다. 이 아래는 이 프로젝트 전용 훅만 남긴다.
hooks:
  PreToolUse:
    - component: pre-commit-gate.sh
      matcher: "Bash"
      timeout: 120

config:
  enableAllProjectMcpServers: true

mcps:
  playwright:
    command: npx
    args:
      - -y
      - "@playwright/mcp@latest"

plugins:
  items:
    - kotlin-lsp
