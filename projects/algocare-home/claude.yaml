# config·hooks·mcps는 대상 프로젝트의 .claude/settings.local.json으로 배포된다
# (전역 sync만 settings.json). settings.local.json은 대상 레포에서 gitignore되므로
# (algocare-home .gitignore) 여기 둔 개인 절대경로도 팀 레포엔 커밋되지 않는다.
# OMT의 claude.yaml(git 추적)과 claude.local.yaml(gitignore)은 "OMT 레포에
# 버전관리하느냐"의 축일 뿐 — 배포 착지점은 둘 다 gitignore된 settings.local.json.
# 메커니즘 전문: docs/platform-yaml-config-deployment.md
config:
  env:
    # 워크트리 공유 turbo 캐시(해시키드 경로 지정, 캐시 무효화 아님).
    TURBO_CACHE_DIR: "/Users/toong/Library/Caches/algocare-home/turbo"

hooks:
  PreToolUse:
    # verify-entrypoint-gate: 무필터 test/lint deny + entrypoint 화이트리스트.
    # 스크립트는 글로벌 단일본($HOME/.claude/scripts/verify-entrypoint-gate/)으로 배포되고
    # (루트 sync.yaml scripts 섹션), 여기서는 raw command로 그 경로를 참조해 등록만 한다
    # — 워크트리마다 복사하지 않고, 발동은 algocare-home 한정. base 정책은
    # index.ts가 import.meta.url 기준(스크립트 옆)으로 로드하므로 글로벌 위치에서 정상 동작.
    - command: "bun run $HOME/.claude/scripts/verify-entrypoint-gate/index.ts"
      matcher: "Bash"
      timeout: 10

mcps:
  notion-algocare:
    type: http
    url: "https://mcp.notion.com/mcp"
