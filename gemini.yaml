# MCP definitions shared with codex.yaml — keep in sync
mcps:
  context7:
    command: npx
    args:
      - -y
      - "@upstash/context7-mcp@latest"
  # Figma hosted MCP via mcp-remote stdio proxy. OAuth on first run.
  figma:
    command: npx
    args:
      - "-y"
      - "mcp-remote"
      - "https://mcp.figma.com/mcp"
  # Maestro stdio MCP. Requires the maestro CLI on PATH (and JAVA_HOME in shell env for the JVM-based runner).
  # On platforms that launch MCP servers in a minimal shell (no profile PATH), replace 'maestro' with its absolute path.
  maestro:
    command: maestro
    args:
      - "mcp"
