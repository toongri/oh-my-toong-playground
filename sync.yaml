path: "~"

# codegraph 바이너리 전역 설치 (PATH 체크라 디렉토리 무관 → 루트에서 1회).
# 인덱스 빌드(codegraph init)는 repo별이라 각 projects/*/sync.yaml에 남겨둠.
provision:
  - check: "command -v codegraph"
    commands:
      - "npm i -g @colbymchenry/codegraph"

skills:
  items:
    # hud는 Claude Code 전용 statusline 기능 — settings.local.json·claudeAiOauth를 읽고
    # ${CLAUDE_SKILL_DIR}/../../ 경로로 리졸브하므로 Codex/Gemini/OpenCode엔 존재하지 않음.
    - component: hud
      platforms: [claude]
    - component: pin-record
      platforms: [claude]
    - component: pin-query
      platforms: [claude]
    - component: pin-audit
      platforms: [claude]
    - component: pin-wrap-up
      platforms: [claude]
    - component: pin-setup
      platforms: [claude]
    - mock-interview
    - scan-pdf-to-notes
    - component: meeting-notes
      platforms: [claude]
    - component: goal
      platforms: [claude]
    - component: ultragoal
      platforms: [claude]
    - agent-browser

scripts:
  items:
    # verify-caps-gate: 무필터 test/lint deny + 러너별 메모리 캡 주입 엔진.
    # scripts로 배포(등록 없음)하여 $HOME/.claude/scripts/verify-caps-gate/에 단일본으로 두고,
    # 실제 hook 등록은 projects/algocare-home/claude.yaml이 raw command로 이 경로를 참조한다.
    # 정책 파일 verify-caps.yaml은 index.ts가 import.meta.url 기준(자기 옆)으로 로드.
    - component: verify-caps-gate
      platforms: [claude]

rules:
  items:
    - communication-style
    - convention-grounding
    - verification-discipline
