path: "~"

# codegraph 바이너리 전역 설치 (PATH 체크라 디렉토리 무관 → 루트에서 1회).
# 인덱스 빌드(codegraph init)는 repo별이라 각 projects/*/sync.yaml에 남겨둠.
provision:
  - check: "command -v codegraph"
    commands:
      - "npm i -g @colbymchenry/codegraph"

# goal/ultragoal의 실행 체인 중 에이전트 절반. 아래 skills의 sisyphus·
# code-review와 짝이며, 넷이 다 있어야 체인이 닫힌다 — sisyphus가 실행을
# sisyphus-junior에게, 완료 게이트가 리뷰를 code-reviewer에게 위임한다.
# feature-platforms.agents가 [claude, codex]라 bare 선언으로 충분하다.
agents:
  items:
    - code-reviewer
    - sisyphus-junior

skills:
  items:
    # goal/ultragoal의 실행 체인 중 스킬 절반. goal은 실행을 재구현하지 않고
    # 전부 위임하므로(skills/goal/SKILL.md의 "Goal does not reimplement
    # execution ... dispatches execution to sisyphus"), 이 둘 없이 goal/
    # ultragoal만 배포하면 첫 실행 디스패치에서 멈춘다. 아래에서 두 스킬을
    # codex로 여는 이상 체인도 같은 플랫폼 집합으로 열려 있어야 한다.
    - component: sisyphus
      platforms: [claude, codex]
    - component: code-review
      platforms: [claude, codex]
    # hud는 Claude Code 전용 statusline 기능 — settings.local.json·claudeAiOauth를 읽고
    # ${CLAUDE_SKILL_DIR}/../../ 경로로 리졸브하므로 Codex/Gemini/OpenCode엔 존재하지 않음.
    - component: hud
      platforms: [claude]
    - component: pin-record
      platforms: [claude]
    - component: pin-query
      platforms: [claude]
    - component: pin-audit
      platforms: [claude]
    - component: pin-wrap-up
      platforms: [claude]
    - component: pin-setup
      platforms: [claude]
    - scan-pdf-to-notes
    - component: meeting-notes
      platforms: [claude]
    # codex 개방 근거는 두 겹이고, 두 겹이 다 필요하다.
    # (1) .md — rewrite 규칙 6a가 Skill() 호출을 $X mention sigil로 치환한다
    #     (tools/lib/rewrite-rules.ts의 id "6a" 규칙). make validate의 codex-rewrite
    #     스캐너가 uncovered 0건으로 실측했다. 단 그 스캐너는 .md만 본다
    #     (tools/validators/components.ts:663-664) — 그래서 (2)가 따로 필요하다.
    # (2) 프로그램 파일 — codex 타겟에도 그대로 복사되지만 절대 rewrite되지
    #     않으므로(tools/sync.ts의 rewriteFilesUnder — collectMdFiles로 .md만
    #     수집하며, 그 doc comment가 프로그램 파일은 "deliberately NEVER walked
    #     here"라고 명시) (1)의 실측이 덮지 못한다. 두 스킬의
    #     상태 스크립트를 전수 감사해, 세션 ID와 OMT 디렉터리를 공유 코어
    #     (@lib/state-core의 resolveSessionIdOrThrow, @lib/omt-dir의 getOmtDir)에
    #     위임함을 확인했다. 둘 다 env가 없을 때 cwd에서 유도하므로, OMT_DIR·
    #     OMT_SESSION_ID를 나르는 CLAUDE_ENV_FILE이 존재하지 않는 Codex에서도
    #     동작한다(hooks/session-start.sh:61-68, hooks/codex-ledger.sh:44-58).
    - component: goal
      platforms: [claude, codex]
    - component: ultragoal
      platforms: [claude, codex]
    - agent-browser
    - component: receiving-code-review
      platforms: [claude]
    - component: test-driven-development
      platforms: [claude]
    - component: writing-skills
      platforms: [claude]

scripts:
  items:
    # verify-entrypoint-gate: entrypoint 화이트리스트를
    # package.json scripts와 실시간 교집합해 존재하지 않는 스크립트를 안내하지 않는다.
    # scripts로 배포(등록 없음)하여 $HOME/.claude/scripts/verify-entrypoint-gate/에 단일본으로 두고,
    # 실제 hook 등록은 projects/algocare-home/claude.yaml이 raw command로 이 경로를 참조한다.
    # base 정책 verify-entrypoint-gate.yaml은 index.ts가 import.meta.url 기준(자기 옆)으로
    # 로드하지만, 프로젝트 오버레이 .local.yaml은 대상 워크스페이스 루트 기준으로 로드한다
    # — 이 2층 분리가 구 게이트의 구조적 버그를 고친 지점. 구 loadConfig는 base·local을
    # 둘 다 스크립트 자기 디렉터리에서 해석해서, 전역 단일본 배포 하에선 "프로젝트별
    # 오버라이드"마저 전역 단일본이었다(어느 프로젝트에서 실행해도 같은 파일을 봤다).
    - component: verify-entrypoint-gate
      platforms: [claude]

rules:
  items:
    - communication-style
    - continuation-contract
    - convention-grounding
    - verification-discipline
