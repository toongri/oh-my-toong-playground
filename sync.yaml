path: "~"

# codegraph 바이너리 전역 설치 (PATH 체크라 디렉토리 무관 → 루트에서 1회).
# 인덱스 빌드(codegraph init)는 repo별이라 각 projects/*/sync.yaml에 남겨둠.
provision:
  - check: "command -v codegraph"
    commands:
      - "npm i -g @colbymchenry/codegraph"

skills:
  items:
    - hud
    - component: pin-record
      platforms: [claude]
    - component: pin-query
      platforms: [claude]
    - component: pin-audit
      platforms: [claude]
    - component: pin-wrap-up
      platforms: [claude]
    - component: pin-setup
      platforms: [claude]
    - mock-interview
    - scan-pdf-to-notes
    - component: goal
      platforms: [claude]
    - agent-browser

rules:
  items:
    - communication-style
