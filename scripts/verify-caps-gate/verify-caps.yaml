# verify-caps-gate shared base policy (committed). Read from this module's own
# directory by index.ts's loadConfig and merged with verify-caps.local.yaml
# (gitignored per-project override) — local wins, per-runner (one level deep):
#   merged.runners[X] = { ...base.runners[X], ...local.runners[X] }
#
# Each runner is matched by its first shell token. Three closed action kinds:
#   env  — prepend `VAR=value` assignments in front of the command (skip a VAR
#          already present). Applies whenever the runner is matched, regardless
#          of compound/`--` shape — env-prefix assignment only ever binds to
#          the first sub-command, so it is always safe to prepend.
#   flag — append `--flag=value` to the end of the command (skip if that flag
#          key is already present). Only applied to a single simple command
#          (no && || | ; newline > < ` $( ) with no end-of-options `--` marker
#          — tail-appending onto a compound command or after `--` can land the
#          flag on the wrong program or as a literal positional argument.
#   deny — reject an unfiltered root `<runner> [run] (test|lint)` invocation
#          (script name matched exactly, not e.g. "test:changed") unless the
#          command carries one of scope_flags anywhere.
#
# inject_scripts (general-purpose runners pnpm/turbo only) — env/flag caps are
# injected ONLY when the command invokes a verification script: a word starting
# with one of these prefixes (test → test/test:changed, verify → verify:quick).
# Injecting env forces permissionDecision:allow (auto-approve), so without this
# gate a non-verification command (pnpm publish, pnpm dlx, turbo gen) would be
# injected and silently approved past the Bash permission prompt. vitest/jest
# omit inject_scripts (dedicated test runners, no dangerous subcommands) and
# inject unconditionally.
#
# vitest/turbo/pnpm all get VITEST_MAX_FORKS + VITEST_MAX_THREADS: vitest
# needs both across pool types (s1 spike: VITEST_MAX_FORKS bounds concurrent
# forks-pool workers; VITEST_MAX_THREADS is the threads-pool analogue and is
# ignored when inactive — zero side effect), and turbo/pnpm need them too
# because they may spawn vitest as a child process that inherits env.
runners:
  vitest:
    env:
      VITEST_MAX_FORKS: "2"
      VITEST_MAX_THREADS: "2"
  jest:
    flag: "--maxWorkers=2"
  turbo:
    env:
      VITEST_MAX_FORKS: "2"
      VITEST_MAX_THREADS: "2"
    flag: "--concurrency=1"
    # --concurrency only applies alongside a scope flag: an unfiltered `turbo
    # run local/start/ios/android` invocation can target a persistent task,
    # and forcing --concurrency=1 there hard-errors ("N persistent tasks but
    # concurrency of 1"). Gate the flag to commands that already carry one of
    # deny.scope_flags below (the old bash gate had this same restriction).
    flag_requires_scope: true
    inject_scripts: ["test", "lint", "build", "typecheck"]
    deny:
      scripts: ["test", "lint"]
      scope_flags: ["--filter", "-F", "--affected"]
  pnpm:
    env:
      VITEST_MAX_FORKS: "2"
      VITEST_MAX_THREADS: "2"
    inject_scripts: ["test", "lint", "verify"]
    deny:
      scripts: ["test", "lint"]
      scope_flags: ["--filter", "-F", "--affected"]
      # selector_required_scripts — a SECOND deny axis for a scoped-but-whole-package
      # run. `pnpm --filter <pkg> test` (with a scope flag but NO test selector) runs
      # that package's ENTIRE suite — the exact whole-suite habit verification-discipline
      # exists to prevent (witnessed: 16 vitest forks from one such command). Deny it
      # and steer to verify:quick (change-affected scope) or a named selector. A run
      # that DOES carry a selector — a positional (`test payment.router`), a `-t`/
      # `--testNamePattern` flag, or a sub-scripted name (`test:changed`, not exact
      # `test`) — is intentionally narrowed and still allowed+capped. Redirections/pipes
      # after the script (`test 2>&1 | tail`, `test > out.txt`) are NOT selectors, so a
      # bare-with-redirection run still denies. This axis is updatedInput-independent:
      # deny works whether or not the harness honors the cap-injection rewrite.
      selector_required_scripts: ["test"]
      selector_required_reason: "`pnpm --filter <pkg> test`는 해당 패키지 전체 테스트 스위트를 실행합니다(리소스 폭증). 변경 영향 범위만 검증하려면 `pnpm verify:quick`을, 특정 테스트만 실행하려면 테스트명/경로를 지정하세요(예: `pnpm --filter <pkg> test <파일명 또는 -t \"패턴\">`)."
