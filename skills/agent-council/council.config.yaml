# Agent Council Configuration
# Add or remove council members as needed.
# Note: Missing CLIs will report `missing_cli` at runtime.

council:
  # Council members configuration
  # Each member needs:
  #   - name: identifier for the agent
  #   - command: CLI command to execute (prompt will be appended)
  #   - emoji: display emoji (optional)
  #   - color: ANSI color (RED, GREEN, BLUE, YELLOW, CYAN)
  #
  # Per-member CLI configuration (all optional):
  #   model:         Model name passed to CLI (claude/gemini: --model, codex: -m)
  #   effort_level:  Thinking effort (low/medium/high)
  #                  claude: env CLAUDE_CODE_EFFORT_LEVEL, codex: -c flag, gemini: ignored
  members:
    - name: claude
      command: "claude -p"
      emoji: "🧠"
      color: "CYAN"
      model: "claude-opus-4-7"
      effort_level: "xhigh"

    - name: gpt
      command: codex exec
      emoji: "🤖"
      color: "BLUE"
      model: "gpt-5.6-sol"
      effort_level: "xhigh"
      output_format: json

    - name: glm
      command: "opencode run"
      emoji: "🟣"
      color: "YELLOW"
      model: "opencode-go/glm-5.2"
      output_format: json

  # Execution settings
  settings:
    exclude_chairman_from_members: false  # Chairman also participates as a council member
    timeout: 1200                         # Timeout seconds per agent (0 to disable)
