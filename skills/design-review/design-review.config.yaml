# Design Review Configuration
# External dispatch: one codex reviewer (gpt-5.5, xhigh reasoning) via `codex exec`.
# model + effort_level + output_format resolve to:
#   codex exec -m gpt-5.5 -c model_reasoning_effort=xhigh --json --skip-git-repo-check
# codex uses bare model ids (no `openai/` prefix). If codex rejects `gpt-5.5`, fall back to `gpt-5.4`.

review:
  members:
    - name: gpt
      command: codex exec
      emoji: "🤖"
      color: "BLUE"
      model: "gpt-5.5"
      effort_level: "xhigh"
      output_format: json

  settings:
    timeout: 1200
