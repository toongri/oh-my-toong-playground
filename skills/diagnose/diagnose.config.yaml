# Diagnose Configuration
# Single-reviewer configuration for opencode Hephaestus agent.

review:
  members:
    - name: hephaestus
      command: 'opencode run --agent "Hephaestus - Deep Agent"'
      emoji: "🔨"
      color: "BLUE"
      output_format: json

  multi_turn:
    max_turns: 3
    deliverable_sentinel: '## Diagnosis\s*\n'

  settings:
    timeout: 600
