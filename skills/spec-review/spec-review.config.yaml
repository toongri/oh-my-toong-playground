# Spec Review Configuration
# Multi-AI advisory panel for spec and design review.
# Max 3 reviewers: claude, gemini, codex

spec-review:
  # Reviewers configuration
  # Each reviewer needs:
  #   - name: identifier for the agent
  #   - command: CLI command to execute (prompt will be appended)
  #   - emoji: display emoji
  #   - color: ANSI color (RED, GREEN, BLUE, YELLOW, CYAN)
  #
  # --- Per-reviewer CLI configuration (all optional) ---
  # model:         Model name passed to CLI (claude/gemini: --model, codex: -m)
  # effort_level:  Thinking effort (low/medium/high)
  #                claude: env CLAUDE_CODE_EFFORT_LEVEL, codex: -c flag, gemini: ignored
  members:
    - name: claude
      command: "claude -p"
      emoji: "🧠"
      color: "CYAN"
      model: "claude-opus-4-7"
      effort_level: "xhigh"

    - name: gemini
      command: "gemini"
      emoji: "💎"
      color: "GREEN"
      model: "gemini-3.1-pro-preview"

    - name: gpt
      command: opencode run --format default --agent "Hephaestus - Deep Agent"
      emoji: "🤖"
      color: "BLUE"
      model: "openai/gpt-5.5"
      effort_level: "high"

  # Execution settings
  settings:
    exclude_chairman_from_members: false  # Chairman also participates as a review member
    timeout: 3600                         # Timeout seconds per reviewer (spec reviews take longer)

  # Spec context configuration
  context:
    shared_context_dir: "~/.omt/${OMT_PROJECT}/context"   # All *.md files in this dir
    specs_dir: "specs"                           # {specName}/spec.md and {specName}/records/*.md
