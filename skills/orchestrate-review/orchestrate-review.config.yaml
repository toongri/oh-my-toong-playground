chunk-review:
  members:
    # Each reviewer = vanilla `opencode run` invoking a specific omo agent.
    # The omo plugin registers core agents under display names with leading
    # zero-width-space (U+200B) characters used as a sort key:
    #   Sisyphus    → 1 ZWS + "Sisyphus - Ultraworker"
    #   Hephaestus  → 2 ZWS + "Hephaestus - Deep Agent"
    # opencode's agent registry is exact-match, so the --agent value MUST
    # include the exact ZWS prefixes. We use literal U+200B characters inside
    # the agent display name. The YAML value is unquoted at the OUTER level so
    # parseYamlSimple preserves the inner double-quotes verbatim (they are
    # interpreted by splitCommand as quote toggles for the agent arg).
    #
    # Provider routing (all already authenticated — see `opencode auth list`):
    #   gpt      — openai/gpt-5.5             via native OpenAI OAuth
    #   deepseek — opencode-go/deepseek-v4-pro  via OpenCode Go gateway
    #   kimi     — opencode-go/kimi-k2.6        via OpenCode Go gateway
    - name: gpt
      command: opencode run --agent "​​Hephaestus - Deep Agent"
      emoji: "\U0001F916"
      color: "BLUE"
      model: "openai/gpt-5.5"
      effort_level: "high"
      output_format: "text"
    - name: deepseek
      command: opencode run --agent "​​Hephaestus - Deep Agent"
      emoji: "\U0001F40B"
      color: "MAGENTA"
      model: "opencode-go/deepseek-v4-pro"
      effort_level: "high"
      output_format: "text"
    - name: kimi
      command: opencode run --agent "​Sisyphus - Ultraworker"
      emoji: "\U0001F319"
      color: "YELLOW"
      model: "opencode-go/kimi-k2.6"
      effort_level: "high"
      output_format: "text"
  settings:
    timeout: 900
    # Used by chunk-review-job.js to exclude the chairman model from the
    # external reviewer list. With the omo-based members above (no `claude`
    # member), this flag is currently a no-op; left as-is for future
    # compatibility if a claude reviewer is added back.
    exclude_chairman_from_members: false
