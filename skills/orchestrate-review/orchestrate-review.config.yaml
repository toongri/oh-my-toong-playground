chunk-review:
  members:
    # Each member is a FINDER ANGLE, not a model. The multi-AI review fans out
    # one CLI invocation per angle, each given a distinct review lens via its
    # role prompt (scripts/prompts/<name>.md, auto-loaded by member name).
    # Finders surface raw candidates only — no verdict, no severity. The
    # upstream code-review skill verifies each candidate (assigns
    # CONFIRMED/PLAUSIBLE/REFUTED) and ranks the survivors.
    #
    # Per-angle model: each member carries its own command/model, so any angle
    # can run on a different CLI/model. Today every angle runs on codex at gpt-5.6-sol,
    # high reasoning effort. `model` + `effort_level` + `output_format` (below) plus
    # `settings.deny.skills` (below) resolve (via buildAugmentedCommand) to:
    #   codex exec -m gpt-5.6-sol -c skills.config=[…from settings.deny.skills below…] \
    #     -c model_reasoning_effort=high --json --skip-git-repo-check
    # Note: codex uses bare model ids (no `openai/` prefix). Git history attests
    # codex with gpt-5.4 / gpt-5.3-codex (gpt-5.5 itself only ran via opencode);
    # if codex rejects `gpt-5.6-sol`, fall back to `gpt-5.5`.
    # Change one member's `model`/`command` to run that angle on a different model/CLI.
    #
    # Angle set: 3 correctness lenses + 1 cleanup lens + 1 security lens + 1 coverage lens.
    - name: line-scan
      command: codex exec
      model: gpt-5.6-sol
      emoji: "\U0001F50D"
      color: "BLUE"
      effort_level: high
      output_format: json
    - name: regression
      command: codex exec
      model: gpt-5.6-sol
      emoji: "\U0001F5D1"
      color: "MAGENTA"
      effort_level: high
      output_format: json
    - name: cross-file
      command: codex exec
      model: gpt-5.6-sol
      emoji: "\U0001F517"
      color: "CYAN"
      effort_level: high
      output_format: json
    - name: cleanup
      command: codex exec
      model: gpt-5.6-sol
      emoji: "\U0001F9F9"
      color: "YELLOW"
      effort_level: high
      output_format: json
    - name: security
      command: codex exec
      model: gpt-5.6-sol
      emoji: "\U0001F512"
      color: "RED"
      effort_level: high
      output_format: json
    - name: coverage
      command: codex exec
      model: gpt-5.6-sol
      emoji: "\U0001F4CB"
      color: "GREEN"
      effort_level: high
      output_format: json
  settings:
    timeout: 1800
    # No-op with the angle members above (no `claude` member to exclude); kept
    # for compatibility if a claude-hosted angle is added later.
    exclude_chairman_from_members: false
    deny:
      # Self-recursion fan-out guard: each dispatched angle runs `codex exec`,
      # so without this it could itself invoke a review/council skill and
      # spawn another fan-out beneath this one. Blocks the 3 skills that can
      # start a review/council job. `code-review` has no codex-side SKILL.md
      # today (not deployed to codex in any of its 4 scopes) — declared
      # anyway so this guard self-activates the day `code-review`'s
      # `platforms` config adds codex, instead of silently staying a no-op.
      skills:
        - orchestrate-review
        - code-review
        - agent-council
