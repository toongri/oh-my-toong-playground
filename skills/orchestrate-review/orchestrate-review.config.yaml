chunk-review:
  members:
    # Each reviewer = vanilla `opencode run` invoking a specific omo agent.
    # Agent names match the exact display name registered by the omo plugin
    # (verified via `opencode agent list`). No prefix decoration — opencode's
    # registry is exact-match.
    #
    # Provider routing (all already authenticated — see `opencode auth list`):
    #   gpt      — openai/gpt-5.5             via native OpenAI OAuth
    #   kimi     — opencode-go/kimi-k2.6        via OpenCode Go gateway
    - name: gpt
      command: opencode run --agent "Hephaestus - Deep Agent"
      emoji: "\U0001F916"
      color: "BLUE"
      model: "openai/gpt-5.5"
      effort_level: "high"
      output_format: json
    - name: kimi
      # OPENSEARCH_DISABLED_TOOLS: opensearch MCP의 typeless `Body` 스키마 tool 4종을 서버 단에서 제외.
      # kimi(Moonshot/SGLang)는 type 없는 JSON Schema 노드를 400(invalid_request_error)으로 거부 →
      # 이 4종만 빼면 통과. opensearch MCP는 그대로 유지돼 다른 도구·Claude Code에 무영향. gpt는 불필요해 미적용.
      command: env OPENSEARCH_DISABLED_TOOLS=CountTool,MsearchTool,ExplainTool,SearchIndexTool opencode run --agent "Sisyphus - Ultraworker"
      emoji: "\U0001F319"
      color: "YELLOW"
      model: "opencode-go/kimi-k2.6"
      effort_level: "high"
      output_format: json
  settings:
    timeout: 1800
    # Used by chunk-review-job.js to exclude the chairman model from the
    # external reviewer list. With the omo-based members above (no `claude`
    # member), this flag is currently a no-op; left as-is for future
    # compatibility if a claude reviewer is added back.
    exclude_chairman_from_members: false
